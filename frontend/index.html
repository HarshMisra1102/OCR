<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SmartChessAI Advanced</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>

  <style>
    body { background:#1e1e1e; color:white; text-align:center; font-family:Arial; }
    #board { width:400px; margin:20px auto; }
    button { padding:8px 15px; margin:10px; }
    ul { list-style:none; padding:0; }
  </style>
</head>

<body>

<h2>♟ SmartChessAI Advanced Analyzer</h2>

<div id="board"></div>
<button onclick="analyze()">Analyze</button>

<ul id="info"></ul>

<script>

var game = new Chess();
var board = null;

function onDrop(source, target) {
    var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
    });
    if (move === null) return 'snapback';
}

document.addEventListener("DOMContentLoaded", function() {
    board = Chessboard('board', {
        position: 'start',
        draggable: true,
        onDrop: onDrop,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });
});

function drawArrow(move) {
    if (!move) return;

    const from = move.substring(0,2);
    const to = move.substring(2,4);

    const square = document.querySelector(`[data-square='${from}']`);
    if (square) {
        square.style.background = "radial-gradient(circle, yellow 40%, transparent 70%)";
    }
}

function analyze() {

    fetch("http://127.0.0.1:10000/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({fen: game.fen(), time_limit: 1})
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("info").innerHTML =
            "<li>Best Move: " + data.best_move + "</li>" +
            "<li>Evaluation: " + data.evaluation + "</li>" +
            "<li>Depth: " + data.depth + "</li>" +
            "<li>Nodes: " + data.nodes + "</li>" +
            "<li>PV: " + data.pv.join(" ") + "</li>";

        if (data.blunder) {
            alert("⚠ Blunder detected!");
        }

        drawArrow(data.best_move);
    });
}

</script>

</body>
</html>
